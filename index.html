<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login pages</title>
    
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- enternal css -->
     <link rel="stylesheet" href="login.css">

</head>
<body id="vanta-bg">
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow  card-login">
            <div class="card-body">
                <h5 class="text-center">LOGIN</h5>
                <div class="row">
                    <div class="col-md-6 border-end d-flex align-items-center justify-content-center">
                        <img src="image/logo.png" alt="Logo" class="logo-img">
                    </div>
                    <div class="col-md-6 mb-4">
                        <form id="loginForm">
                            <label for="Username">Username</label>
                            <input type="text" id="Username" class="form-control mb-2" required>
                            <label for="password">Password</label>
                            <input type="password" id="password" class="form-control mb-2" required>
                            
                            <div id="errorMessage" class="text-danger text-center mb-2" style="display: none;"></div>
                            
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary btn-sm">Login</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<!-- varta background -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
document.getElementById('loginForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    const Username = document.getElementById('Username').value;
    const password = document.getElementById('password').value;
    const errorMessage = document.getElementById('errorMessage');
    
    // Hardcoded credentials for simulation
    const validUsername = 'dummy';
    const validPassword = 'dummy123';
    
    if (Username === validUsername && password === validPassword) 
    {
        window.location.href = 'dashboard.html';
    } 
    else 
    {
        // Show error message
        errorMessage.textContent = 'Invalid username  or password. Please try again.';
        errorMessage.style.display = 'block';
    }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<script>
VANTA.NET({
  el: "#vanta-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  scale: 1.00,
  scaleMobile: 1.00
})
</script>

</body>
</html>
